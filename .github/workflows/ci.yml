name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'specs/**'
      - 'scripts/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/**'
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'specs/**'
      - 'scripts/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Validate Tickets
        run: npm run validate:tickets

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (agent)
        run: npm run test:agent
